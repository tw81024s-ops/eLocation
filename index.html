<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>駕駛行為安全管理看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<!-- ============================================================
     ⬇⬇⬇  設定區：只要改這幾行  ⬇⬇⬇
     1. 依 README 部署 Google Apps Script，取得 /exec 網址
     2. 把網址貼到 GAS_URL
     （留空 = 本機預覽模式，資料只存在你自己的瀏覽器，不會共享）
============================================================ -->
<script>
  const GAS_URL        = "https://script.google.com/macros/s/AKfycbxDK-86R5FeZgZ8ch3VL3TaboOWZ-hTalgBeFaxNnhl2L6J2_-hmqzYhFL0teav_xaz6g/exec";
  const DEPT_NAME      = "中南配送部";
  const IMPORT_PASSCODE= "";              // 選填：設定後，匯入前需輸入此通行碼（簡易防呆，非正式權限）
  const AUTO_REFRESH_SEC = 45;            // 每隔幾秒自動向後台抓最新資料
  // 超速明細可由使用者設定的「行為處置 / 行政懲處」下拉選項（可自行增減；選「其他…」可手動輸入）
  const DISPOSAL_OPTIONS   = ["改善單","口頭告誡","書面警告","教育訓練","面談輔導"];
  const DISCIPLINE_OPTIONS = ["警告","申誡","記過","記大過"];
</script>
<!-- ============================================================
     ⬆⬆⬆  設定區結束  ⬆⬆⬆
============================================================ -->

<style>
:root{
  /* MOMO 粉色亮色主題 */
  --bg:#ffe3ef; --bg2:#ffd1e3; --panel:#ffffff; --panel2:#fff2f7;
  --line:#ffd0e0; --line2:#ffc0d6;
  --txt:#3a1326; --muted:#9c5b78; --dim:#c08aa0;
  --accent:#e6007e; --accent2:#ff4fa3;     /* MOMO 桃紅 */
  --good:#2b9d6a; --good2:#1f9d6a;
  --warn:#e8920c; --orange:#f0640a; --bad:#e02749; --bad2:#c01f3e;
  --blue:#2f73d6;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'Noto Sans TC',system-ui,-apple-system,sans-serif;
  --fs:1;   /* 字級倍率：標準1 / 放大1.5 / 老花2，由按鈕切換 */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);font-size:calc(14px * var(--fs));line-height:1.5;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 12% 0%,rgba(255,79,163,.28),transparent 42%),radial-gradient(circle at 88% 0%,rgba(230,0,126,.18),transparent 45%),linear-gradient(180deg,#ffd1e3,#ffe9f2 60%,#fff4f9);
  background-attachment:fixed;}
.statusbar{height:3px;background:linear-gradient(90deg,var(--good),var(--accent),var(--bad),var(--accent),var(--good));background-size:300% 100%;animation:flow 14s linear infinite}
@keyframes flow{to{background-position:300% 0}}
.wrap{max-width:1320px;margin:0 auto;padding:22px 22px 70px}
header.app{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;border-radius:11px;background:linear-gradient(145deg,var(--accent),var(--accent2));display:grid;place-items:center;flex:0 0 auto;box-shadow:0 6px 22px rgba(230,0,126,.32)}
.logo svg{width:28px;height:28px}
.title h1{font-size:calc(21px*var(--fs));font-weight:900;letter-spacing:.5px;line-height:1.1}
.title .sub{color:var(--muted);font-size:calc(12.5px*var(--fs));margin-top:3px;font-family:var(--mono);letter-spacing:.3px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--sans);font-weight:700;font-size:calc(13.5px*var(--fs));border:1px solid var(--line2);background:var(--panel);color:var(--txt);padding:10px 16px;border-radius:10px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--accent);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(145deg,var(--accent),var(--accent2));color:#fff;border:none;box-shadow:0 5px 18px rgba(230,0,126,.3)}
.btn.ghost{background:transparent}
.btn.danger:hover{border-color:var(--bad);color:var(--bad)}
.btn svg{width:16px;height:16px}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(230,0,126,.06)}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.kpi.c2::before{background:var(--blue)}.kpi.c3::before{background:var(--bad)}.kpi.c4::before{background:var(--good)}.kpi.c5::before{background:var(--orange)}
.kpi .lbl{color:var(--muted);font-size:calc(11.5px*var(--fs));font-weight:500;letter-spacing:.4px}
.kpi .val{font-family:var(--mono);font-weight:700;font-size:calc(27px*var(--fs));margin-top:6px;letter-spacing:-.5px;color:var(--accent)}
.kpi .val small{font-size:calc(13px*var(--fs));color:var(--dim);font-weight:500}
.kpi .ex{font-size:calc(11.5px*var(--fs));color:var(--dim);margin-top:3px;font-family:var(--mono)}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:11px 18px;cursor:pointer;color:var(--muted);font-weight:700;font-size:calc(13.5px*var(--fs));border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--txt)}
.tab.on{color:var(--accent);border-color:var(--accent)}
.panel{display:none;animation:fade .35s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:calc(11px*var(--fs));color:var(--muted);font-weight:600;letter-spacing:.3px;padding-left:2px}
select,input[type=text]{font-family:var(--sans);background:var(--panel);color:var(--txt);border:1px solid var(--line2);border-radius:9px;padding:8px 11px;font-size:calc(13px*var(--fs));min-width:130px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
input[type=text]{min-width:190px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:4px;overflow:hidden;box-shadow:0 4px 16px rgba(230,0,126,.06)}
.tablewrap{overflow-x:auto;border-radius:11px;max-height:64vh}
table{width:100%;border-collapse:collapse;font-size:calc(13px*var(--fs))}
th,td{padding:9px 11px;text-align:left;white-space:nowrap}
thead th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:700;font-size:calc(11.5px*var(--fs));letter-spacing:.4px;border-bottom:1px solid var(--line2);user-select:none}
tbody tr{border-bottom:1px solid var(--line)}
tbody tr:hover{background:#fff2f7}
td.num,th.num{font-family:var(--mono);text-align:right}
td.b{font-weight:700}
.rank{font-family:var(--mono);font-weight:700;color:var(--dim)}
.rank.top{color:var(--accent)}
.badge{display:inline-block;min-width:22px;text-align:center;font-family:var(--mono);font-weight:700;font-size:calc(12px*var(--fs));padding:2px 7px;border-radius:6px;line-height:1.4}
.g-good{background:rgba(43,157,106,.16);color:var(--good)}
.g-warn{background:rgba(232,146,12,.18);color:var(--warn)}
.g-bad{background:rgba(224,39,73,.16);color:var(--bad)}
.g-none{background:rgba(0,0,0,.05);color:var(--dim)}
.sev{font-size:calc(11.5px*var(--fs));font-weight:700;padding:2px 8px;border-radius:20px}
.sev-輕度{background:rgba(47,115,214,.15);color:var(--blue)}
.sev-中度{background:rgba(232,146,12,.18);color:var(--warn)}
.sev-重度{background:rgba(240,100,10,.18);color:var(--orange)}
.sev-嚴重{background:rgba(224,39,73,.18);color:var(--bad)}
.chartbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;height:430px;position:relative;box-shadow:0 4px 16px rgba(230,0,126,.06)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:56px;height:56px;opacity:.4;margin-bottom:14px}
.empty h3{color:var(--txt);font-size:calc(17px*var(--fs));margin-bottom:8px}
.empty p{font-size:calc(13.5px*var(--fs));max-width:460px;margin:0 auto 6px}
.groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.grp{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(230,0,126,.06)}
.grp-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--panel2);border-bottom:1px solid var(--line)}
.grp-h .name{font-weight:900;font-size:calc(15px*var(--fs));letter-spacing:.5px}
.grp-h .cnt{font-family:var(--mono);font-size:calc(12px*var(--fs));color:var(--accent);font-weight:700}
.driver{padding:11px 16px;border-bottom:1px solid var(--line)}
.driver:last-child{border-bottom:none}
.dhead{display:flex;align-items:center;justify-content:space-between;gap:10px}
.driver .dn{font-weight:700;font-size:calc(13.5px*var(--fs))}
.dmeta{font-family:var(--mono);font-size:calc(10.5px*var(--fs));color:var(--dim);margin:1px 0 7px}
.dcount{font-family:var(--mono);font-weight:700;font-size:calc(13px*var(--fs));color:var(--accent);background:rgba(230,0,126,.1);padding:2px 9px;border-radius:20px;white-space:nowrap}
.inc{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-top:6px}
.inc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lv{font-size:calc(10.5px*var(--fs));font-weight:700;color:var(--muted);background:rgba(0,0,0,.05);padding:1px 7px;border-radius:5px}
.inc-time{font-family:var(--mono);font-size:calc(11px*var(--fs));color:var(--muted);margin-left:auto}
.inc-stats{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.inc-stats .st{font-family:var(--mono);font-size:calc(11.5px*var(--fs));color:var(--txt);background:#fff;border:1px solid var(--line);padding:2px 8px;border-radius:6px}
.inc-stats .st b{color:var(--muted);font-weight:700;font-family:var(--sans);margin-right:3px}
.inc-stats .st.over{color:var(--bad);border-color:rgba(224,39,73,.3);background:rgba(224,39,73,.06)}
.inc-stats .st.over b{color:var(--bad)}
.inc-loc{font-size:calc(11.5px*var(--fs));color:var(--muted);margin-top:5px;line-height:1.4;word-break:break-all}
.inc-edit{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line2)}
.inc-edit label{display:inline-flex;align-items:center;gap:5px;font-size:calc(11.5px*var(--fs));font-weight:700;color:var(--muted)}
.inc-edit select{font-family:var(--sans);font-size:calc(12px*var(--fs));background:#fff;color:var(--txt);border:1px solid var(--line2);border-radius:7px;padding:5px 8px;min-width:auto;cursor:pointer}
.inc-edit select:hover{border-color:var(--accent)}
.chkbox{display:inline-flex;align-items:center;gap:6px;font-size:calc(12.5px*var(--fs));color:var(--txt);font-weight:600;cursor:pointer;padding:8px 0}
.chkbox input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:calc(11.5px*var(--fs));color:var(--muted);align-items:center;margin-left:auto}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.note{margin-top:24px;font-size:calc(11.5px*var(--fs));color:var(--muted);text-align:center;font-family:var(--mono);line-height:1.7}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:calc(11.5px*var(--fs));font-family:var(--mono);padding:5px 11px;border-radius:20px;border:1px solid var(--line2);background:var(--panel);font-weight:600}
.pill .d{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.pill.cloud{color:var(--good);border-color:rgba(43,157,106,.4);background:rgba(43,157,106,.1)}.pill.cloud .d{background:var(--good);animation:pulse 2s infinite}
.pill.local{color:var(--warn);border-color:rgba(232,146,12,.4);background:rgba(232,146,12,.1)}.pill.local .d{background:var(--warn)}
.pill.err{color:var(--bad);border-color:rgba(224,39,73,.4);background:rgba(224,39,73,.1)}.pill.err .d{background:var(--bad)}
@keyframes pulse{50%{opacity:.3}}
/* 字級切換器 */
.fsbar{display:inline-flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden;background:var(--panel)}
.fsbar button{border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:13px;padding:9px 13px;cursor:pointer;transition:.15s;white-space:nowrap}
.fsbar button+button{border-left:1px solid var(--line2)}
.fsbar button:hover{color:var(--accent)}
.fsbar button.on{background:linear-gradient(145deg,var(--accent),var(--accent2));color:#fff}
#drop{position:fixed;inset:0;background:rgba(230,0,126,.82);backdrop-filter:blur(4px);z-index:90;display:none;place-items:center}
#drop.show{display:grid}
#drop .inner{border:2px dashed #fff;border-radius:20px;padding:60px 80px;text-align:center}
#drop h2{color:#fff;font-size:calc(22px*var(--fs))}#drop p{color:#ffe3ef;margin-top:8px}
#toast{position:fixed;right:20px;bottom:20px;z-index:100;display:flex;flex-direction:column;gap:9px}
.tmsg{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--good);padding:12px 16px;border-radius:10px;font-size:calc(13px*var(--fs));max-width:360px;box-shadow:0 10px 30px rgba(140,20,70,.25);animation:slideIn .3s ease}
.tmsg.err{border-left-color:var(--bad)}.tmsg.warn{border-left-color:var(--warn)}
.tmsg b{display:block;margin-bottom:2px}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:640px){.wrap{padding:16px 13px 60px}}
</style>
</head>
<body>
<div class="statusbar"></div>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16V7a1 1 0 011-1h10a1 1 0 011 1v9"/><path d="M15 10h3.5a1 1 0 01.8.4l2.3 3.1a1 1 0 01.2.6V16a1 1 0 01-1 1h-1"/><circle cx="7" cy="17.5" r="1.8" fill="#fff" stroke="none"/><circle cx="17.5" cy="17.5" r="1.8" fill="#fff" stroke="none"/><path d="M9 17.5h6"/></svg></div>
      <div class="title"><h1>富昇物流 · 駕駛行為安全管理看板</h1><div class="sub" id="deptline">FU-SHENG LOGISTICS · FLEET SAFETY CONSOLE</div></div>
    </div>
    <div class="actions">
      <div class="fsbar" id="fsbar" title="字體大小">
        <button data-fs="1" class="on">標準</button>
        <button data-fs="1.5">放大</button>
        <button data-fs="2">老花</button>
      </div>
      <span class="pill" id="connPill"><span class="d"></span><span id="connTxt">啟動中…</span></span>
      <button class="btn" id="refreshBtn" title="重新抓取最新資料"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-2.6-6.4M21 4v5h-5"/></svg>更新</button>
      <button class="btn primary" id="importBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>匯入 Excel</button>
      <button class="btn ghost danger" id="clearBtn">清除全部</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" multiple hidden>
    </div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="tabs">
    <div class="tab on" data-tab="rank">站所排行榜</div>
    <div class="tab" data-tab="trend">趨勢分析</div>
    <div class="tab" data-tab="detail">異常明細查詢</div>
    <div class="tab" data-tab="speed">超速人名分類</div>
  </div>

  <section class="panel on" id="p-rank">
    <div class="toolbar">
      <div class="field"><label>資料日期</label><select id="rankDate"></select></div>
      <div class="field"><label>排序</label><select id="rankSort"><option value="rank">依排名</option><option value="score">依總分(低→高)</option><option value="count">依異常次數(高→低)</option></select></div>
      <div class="legend"><span><span class="dot" style="background:var(--good)"></span>A/B 良好</span><span><span class="dot" style="background:var(--warn)"></span>C/D 注意</span><span><span class="dot" style="background:var(--bad)"></span>E+ 危險</span></div>
    </div>
    <div class="card"><div class="tablewrap"><table id="rankTable"></table></div></div>
  </section>

  <section class="panel" id="p-trend">
    <div class="toolbar">
      <div class="field"><label>對象</label><select id="trendScope"></select></div>
      <div class="field"><label>指標</label><select id="trendMetric">
        <option value="score">總分</option><option value="count">總異常次數</option>
        <option value="speedR">超速 次/100KM</option><option value="turnR">急轉彎 次/100KM</option>
        <option value="decelR">急減速 次/100KM</option><option value="accelR">急加速 次/100KM</option>
        <option value="km">總里程數(KM)</option></select></div>
    </div>
    <div class="chartbox"><canvas id="trendChart"></canvas></div>
  </section>

  <section class="panel" id="p-detail">
    <div class="toolbar">
      <div class="field"><label>站所</label><select id="dfBranch"><option value="">全部</option></select></div>
      <div class="field"><label>行為</label><select id="dfBehavior"><option value="">全部</option></select></div>
      <div class="field"><label>異常程度</label><select id="dfDegree"><option value="">全部</option></select></div>
      <div class="field"><label>搜尋(駕駛/車號/地點)</label><input type="text" id="dfSearch" placeholder="輸入關鍵字…"></div>
      <div class="field"><label>&nbsp;</label><button class="btn" id="dfExport">匯出 CSV</button></div>
    </div>
    <div class="card"><div class="tablewrap"><table id="detailTable"></table></div></div>
  </section>

  <section class="panel" id="p-speed">
    <div class="toolbar">
      <div class="field"><label>站所</label><select id="spBranch"><option value="">全部站所</option></select></div>
      <div class="field"><label>最低程度</label><select id="spSev"><option value="">全部</option><option value="中度">中度以上</option><option value="重度">重度以上</option><option value="嚴重">僅嚴重</option></select></div>
      <div class="field"><label>&nbsp;</label><label class="chkbox"><input type="checkbox" id="spDisc"> 只看已設定處置／懲處</label></div>
    </div>
    <div id="speedGroups" class="groups"></div>
  </section>

  <div class="note" id="footnote"></div>
</div>

<div id="drop"><div class="inner"><h2>放開即可匯入</h2><p>支援「站所統計表」與「異常明細表」，系統自動辨識</p></div></div>
<div id="toast"></div>

<script>
const ONLINE = /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(GAS_URL);
const LKEY = 'fleet_local_v1';
let DAILY = {dept:DEPT_NAME, days:{}};
let ANOM  = {records:[]};
let trendChart=null, lastSig='', busy=false;

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const pad=n=>String(n).padStart(2,'0');
const num=v=>{if(v==null)return 0;const m=String(v).replace(/,/g,'').match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):0;};
const txt=v=>v==null?'':String(v).trim();
const sum=a=>a.reduce((x,y)=>x+(y||0),0);
const avg=a=>a.length?sum(a)/a.length:0;

/* ---------- store (GAS 或 本機) ---------- */
async function gasGet(){const r=await fetch(GAS_URL+'?action=load&t='+Date.now(),{redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
async function gasPost(p){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p),redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
function saveLocal(){localStorage.setItem(LKEY,JSON.stringify({DAILY,ANOM}));}

const fromDailyRow=r=>({branch:txt(r.branch),grade:txt(r.grade),rank:num(r.rank),score:num(r.score),vehicles:num(r.vehicles),km:num(r.km),count:num(r.count),speedG:txt(r.speed_g),speedR:num(r.speed_r),turnG:txt(r.turn_g),turnR:num(r.turn_r),decelG:txt(r.decel_g),decelR:num(r.decel_r),accelG:txt(r.accel_g),accelR:num(r.accel_r)});
const fromAnomRow=r=>({date:txt(r.date),branch:txt(r.branch),plate:txt(r.plate),driver:txt(r.driver),behavior:txt(r.behavior),level:txt(r.level),time:txt(r.time),maxSpeed:txt(r.max_speed),location:txt(r.location),legal:txt(r.legal),over:num(r.over_km),degText:txt(r.deg_text),degCode:txt(r.deg_code),disposal:txt(r.disposal),disc:txt(r.disc)});

async function loadAll(){
  if(ONLINE){
    const d=await gasGet();
    if(!d||d.ok===false)throw new Error(d&&d.error||'load failed');
    DAILY={dept:DEPT_NAME,days:{}};
    (d.daily||[]).forEach(r=>{const dt=txt(r.date);if(!dt)return;(DAILY.days[dt]=DAILY.days[dt]||{branches:[]}).branches.push(fromDailyRow(r));});
    ANOM={records:(d.anom||[]).map(fromAnomRow).filter(x=>x.plate||x.driver)};
  }else{
    const raw=localStorage.getItem(LKEY);
    if(raw){const o=JSON.parse(raw);DAILY=o.DAILY||{dept:DEPT_NAME,days:{}};ANOM=o.ANOM||{records:[]};}
  }
}
function signature(){const dn=Object.keys(DAILY.days).sort();let c=0;dn.forEach(d=>c+=DAILY.days[d].branches.length);return dn.length+'/'+c+'/'+ANOM.records.length+'/'+(dn[dn.length-1]||'');}

/* ---------- parsing ---------- */
function getDate(aoa){
  for(const row of aoa)for(const c of row){if(c==null)continue;const s=String(c);if(s.includes('查詢起迄')){const m=s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);if(m)return m[1]+'-'+pad(m[2])+'-'+pad(m[3]);}}
  for(const row of aoa)for(const c of row){if(c==null)continue;const m=String(c).match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);if(m)return m[1]+'-'+pad(m[2])+'-'+pad(m[3]);}
  return null;
}
const findRow=(aoa,fn)=>{for(let i=0;i<aoa.length;i++)if(fn(aoa[i]))return i;return -1;};
const isBranch=b=>/^[A-Za-z]{1,4}\d+$/.test(b);
function parseDaily(aoa){
  const hi=findRow(aoa,r=>r.some(c=>txt(c)==='分公司')&&r.some(c=>txt(c).includes('總分')));
  if(hi<0)return null;const date=getDate(aoa);if(!date)return null;
  const h=aoa[hi].map(txt);const find=fn=>{for(let i=0;i<h.length;i++)if(fn(h[i]))return i;return -1;};
  const col={branch:h.indexOf('分公司'),grade:h.indexOf('總評等'),rank:h.indexOf('排名'),score:h.indexOf('總分'),
    vehicles:find(x=>x.includes('車輛數')),km:find(x=>x.includes('里程')),count:find(x=>x.includes('總次數')),
    sg:find(x=>x.includes('超速')&&x.includes('評等')),sr:find(x=>x.includes('超速')&&x.includes('100')),
    tg:find(x=>x.includes('急轉彎')&&x.includes('評等')),tr:find(x=>x.includes('急轉彎')&&x.includes('100')),
    dg:find(x=>x.includes('急減速')&&x.includes('評等')),dr:find(x=>x.includes('急減速')&&x.includes('100')),
    ag:find(x=>x.includes('急加速')&&x.includes('評等')),ar:find(x=>x.includes('急加速')&&x.includes('100'))};
  const branches=[];
  for(let i=hi+1;i<aoa.length;i++){const r=aoa[i];const b=txt(r[col.branch]);if(!isBranch(b))continue;
    branches.push({branch:b,grade:txt(r[col.grade]),rank:num(r[col.rank]),score:num(r[col.score]),vehicles:num(r[col.vehicles]),km:num(r[col.km]),count:num(r[col.count]),speedG:txt(r[col.sg]),speedR:num(r[col.sr]),turnG:txt(r[col.tg]),turnR:num(r[col.tr]),decelG:txt(r[col.dg]),decelR:num(r[col.dr]),accelG:txt(r[col.ag]),accelR:num(r[col.ar])});}
  return branches.length?{date,branches}:null;
}
function parseAnom(aoa){
  const hi=findRow(aoa,r=>r.some(c=>txt(c)==='車號')&&r.some(c=>txt(c)==='駕駛')&&r.some(c=>txt(c)==='行為'));
  if(hi<0)return null;const date=getDate(aoa);const h=aoa[hi].map(txt);
  const find=fn=>{for(let i=0;i<h.length;i++)if(fn(h[i]))return i;return -1;};
  const deg=[];h.forEach((x,i)=>{if(x==='異常程度')deg.push(i);});
  const col={branch:h.indexOf('分公司'),plate:h.indexOf('車號'),driver:h.indexOf('駕駛'),behavior:h.indexOf('行為'),level:h.indexOf('等級'),
    time:find(x=>x.includes('最高時速時間')),max:find(x=>x.includes('最高時速')&&!x.includes('時間')&&!x.includes('位置')),
    loc:find(x=>x.includes('位置')),legal:find(x=>x.includes('法定')),over:find(x=>x.includes('超過標準')),
    dc:deg[0]!=null?deg[0]:-1,dt:deg[1]!=null?deg[1]:-1,disp:find(x=>x.includes('行為處置')),disc:find(x=>x.includes('行政懲處'))};
  const recs=[];
  for(let i=hi+1;i<aoa.length;i++){const r=aoa[i];const plate=txt(r[col.plate]),driver=txt(r[col.driver]);
    if(!plate||!driver||plate==='車號')continue;
    recs.push({date:date||'',branch:txt(r[col.branch]),plate,driver,behavior:txt(r[col.behavior]),level:txt(r[col.level]),time:txt(r[col.time]),maxSpeed:txt(r[col.max]),location:txt(r[col.loc]),legal:txt(r[col.legal]),over:num(r[col.over]),degText:txt(r[col.dt]),degCode:txt(r[col.dc]),disposal:txt(r[col.disp]),disc:txt(r[col.disc])});}
  return recs.length?recs:null;
}
const anomUniq=x=>[x.date,x.plate,x.driver,x.time,x.location,x.maxSpeed].join('|');
const toDailySnake=(b,date)=>({date,branch:b.branch,grade:b.grade,rank:b.rank,score:b.score,vehicles:b.vehicles,km:b.km,count:b.count,speed_g:b.speedG,speed_r:b.speedR,turn_g:b.turnG,turn_r:b.turnR,decel_g:b.decelG,decel_r:b.decelR,accel_g:b.accelG,accel_r:b.accelR});
const toAnomSnake=x=>({uniq:anomUniq(x),date:x.date,branch:x.branch,plate:x.plate,driver:x.driver,behavior:x.behavior,level:x.level,time:x.time,max_speed:x.maxSpeed,location:x.location,legal:x.legal,over_km:x.over,deg_text:x.degText,deg_code:x.degCode,disposal:x.disposal,disc:x.disc});

async function handleFiles(files){
  if(busy)return;
  if(IMPORT_PASSCODE){const p=prompt('請輸入匯入通行碼：');if(p!==IMPORT_PASSCODE){toast('通行碼錯誤','未執行匯入','err');return;}}
  setBusy(true,'解析中…');
  let dDays=0,dCount=0,aRead=0,aNew=0,bad=0;
  const dailySnake=[],dateSet=new Set(),anomSnake=[];
  const seen=new Set(ANOM.records.map(anomUniq));
  for(const f of files){
    let wb;try{const buf=await f.arrayBuffer();wb=XLSX.read(buf,{type:'array'});}catch(e){bad++;continue;}
    for(const name of wb.SheetNames){
      const aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,raw:false,defval:''});
      const d=parseDaily(aoa);
      if(d){DAILY.days[d.date]={branches:d.branches};dDays++;dCount+=d.branches.length;dateSet.add(d.date);d.branches.forEach(b=>dailySnake.push(toDailySnake(b,d.date)));continue;}
      const a=parseAnom(aoa);
      if(a){aRead+=a.length;a.forEach(x=>{const u=anomUniq(x);if(!seen.has(u)){seen.add(u);ANOM.records.push(x);anomSnake.push(toAnomSnake(x));aNew++;}});}
    }
  }
  try{
    if(ONLINE){
      setBusy(true,'上傳中…');
      if(dailySnake.length)await gasPost({type:'daily',rows:dailySnake,dates:[...dateSet]});
      if(anomSnake.length)await gasPost({type:'anom',rows:anomSnake});
      await loadAll();
    }else{ saveLocal(); }
  }catch(e){ toast('上傳失敗',String(e.message||e)+'（請檢查 GAS 部署/網址）','err'); setBusy(false); renderAll(); return; }
  setBusy(false);
  if(!dDays&&!aRead){toast('未辨識到有效資料',bad?'檔案讀取失敗':'請確認是站所統計表或異常明細表','warn');}
  else{const parts=[];if(dDays)parts.push('統計表 '+dDays+' 天／'+dCount+' 站所列');if(aRead)parts.push('異常明細 新增 '+aNew+' 筆（讀取 '+aRead+'）');toast('匯入完成 ✓',parts.join('　·　'));}
  lastSig=signature();renderAll();
}

/* ---------- helpers / render ---------- */
function gradeCls(g){g=txt(g).toUpperCase();if(!g)return 'g-none';if(g==='A'||g==='B')return 'g-good';if(g==='C'||g==='D')return 'g-warn';return 'g-bad';}
const gbadge=g=>'<span class="badge '+gradeCls(g)+'">'+(txt(g)||'–')+'</span>';
const sortedDates=()=>Object.keys(DAILY.days).sort();
function allBranches(){const s=new Set();sortedDates().forEach(d=>DAILY.days[d].branches.forEach(b=>s.add(b.branch)));return[...s].sort();}
function aggDay(bs){return{score:r1(avg(bs.map(b=>b.score))),count:sum(bs.map(b=>b.count)),km:sum(bs.map(b=>b.km)),speedR:r1(avg(bs.map(b=>b.speedR))),turnR:r1(avg(bs.map(b=>b.turnR))),decelR:r1(avg(bs.map(b=>b.decelR))),accelR:r1(avg(bs.map(b=>b.accelR)))};}

function renderKpis(){
  const dates=sortedDates();const k=$('#kpis');
  if(!dates.length&&!ANOM.records.length){k.innerHTML='';return;}
  const latest=dates[dates.length-1];let best='–',worst='–',avgScore='–';
  if(latest){const bs=DAILY.days[latest].branches;const br=[...bs].sort((a,b)=>a.rank-b.rank);best=br[0]?br[0].branch:'–';worst=br[br.length-1]?br[br.length-1].branch:'–';avgScore=r1(avg(bs.map(b=>b.score)));}
  const cards=[['c1','統計天數',dates.length+'<small> 天</small>',dates.length?dates[0]+' ~ '+latest:''],
    ['c2','站所數',allBranches().length+'<small> 站</small>',DAILY.dept],
    ['c3','異常事件',ANOM.records.length+'<small> 筆</small>','明細表累積'],
    ['c4','最新平均總分',avgScore,latest?('最佳 '+best):''],
    ['c5','最新待改善',worst,latest||'尚無資料']];
  k.innerHTML=cards.map(c=>'<div class="kpi '+c[0]+'"><div class="lbl">'+c[1]+'</div><div class="val">'+c[2]+'</div><div class="ex">'+c[3]+'</div></div>').join('');
}

function renderTrend(){

function renderSpeed(){

  if(brF)recs=recs.filter(r=>r.branch===brF);
  if(minSev==='嚴重')recs=recs.filter(r=>r.degText==='嚴重');else if(mi>=0)recs=recs.filter(r=>ord.indexOf(r.degText)>=mi);
  if(onlyDisc){const has=v=>{v=txt(v);return v&&v!=='-';};recs=recs.filter(r=>has(r.disposal)||has(r.disc));}
  if(!recs.length){box.innerHTML='<div class="empty"><h3>無超速資料</h3><p>匯入「異常明細表」後，這裡會依站所分組列出各駕駛的超速明細；可逐筆設定行為處置與行政懲處。</p></div>';return;}
  const shortTime=t=>{if(!t)return '';const m=String(t).match(/(\d{1,2})\/(\d{1,2})\D+(\d{1,2}:\d{2})/);return m?(pad(m[1])+'/'+pad(m[2])+' '+m[3]):String(t);};

    list.forEach(r=>{const d=drv[r.driver]=drv[r.driver]||{count:0,max:0,items:[]};d.count++;d.max=Math.max(d.max,num(r.maxSpeed));d.items.push(r);});
    const drivers=Object.keys(drv).sort((a,b)=>drv[b].count-drv[a].count);
    const inner=drivers.map(name=>{const d=drv[name];
      const items=d.items.sort((a,b)=>num(b.maxSpeed)-num(a.maxSpeed)).map(it=>{
        const idx=speedRows.push(it)-1;
        const over=num(it.over);
        const stats='<span class="st"><b>最高</b> '+(it.maxSpeed||'?')+'</span>'+
          (it.legal?'<span class="st"><b>法定</b> '+it.legal+'</span>':'')+
          (over?'<span class="st over"><b>超過</b> +'+over+' km</span>':'');
        return '<div class="inc">'+
          '<div class="inc-top">'+
            (it.degText?'<span class="sev sev-'+it.degText+'">'+it.degText+'</span>':'')+
            (it.level?'<span class="lv">'+it.level+'</span>':'')+
            '<span class="inc-time">'+shortTime(it.time)+'</span>'+
          '</div>'+
          '<div class="inc-stats">'+stats+'</div>'+
          (it.location?'<div class="inc-loc">📍 '+it.location+'</div>':'')+
          '<div class="inc-edit">'+
            '<label>處置<select class="esel" data-idx="'+idx+'" data-field="disposal">'+optsHtml(it.disposal,DISPOSAL_OPTIONS)+'</select></label>'+
            '<label>懲處<select class="esel" data-idx="'+idx+'" data-field="disc">'+optsHtml(it.disc,DISCIPLINE_OPTIONS)+'</select></label>'+
          '</div>'+
        '</div>';
      }).join('');
      return '<div class="driver"><div class="dhead"><div class="dn">'+name+'</div><span class="dcount">'+d.count+' 次</span></div>'+
        '<div class="dmeta">最高 '+d.max+' km/hr</div>'+items+'</div>';
    }).join('');
    return '<div class="grp"><div class="grp-h"><span class="name">'+br+'</span><span class="cnt">'+list.length+' 次 · '+drivers.length+' 人</span></div>'+inner+'</div>';}).join('');
  // wire editable selects
  box.querySelectorAll('select.esel').forEach(sel=>{
    sel.dataset.prev=sel.value;
    sel.onchange=async()=>{
      let val=sel.value;
      if(val==='__custom__'){const c=prompt('輸入自訂內容：','');if(c==null){sel.value=sel.dataset.prev;return;}val=c.trim();}
      const rec=speedRows[+sel.dataset.idx];const field=sel.dataset.field;
      const old=rec[field];rec[field]=val;
      const okSave=await saveAnomEdit(rec);
      if(!okSave){rec[field]=old;}
      renderSpeed();renderDetail();
    };
  });
}
async function saveAnomEdit(rec){
  if(ONLINE){
    try{const resp=await gasPost({type:'update_anom',uniq:anomUniq(rec),disposal:txt(rec.disposal),disc:txt(rec.disc)});
      if(resp&&resp.ok){toast('已儲存 ✓','處置／懲處已更新至共享後台');return true;}
      toast('儲存失敗',(resp&&resp.error)||'請確認後台已更新為最新版 Code.gs','err');return false;
    }catch(e){toast('儲存失敗',String(e.message||e),'err');return false;}
  }else{saveLocal();toast('已更新（本機）','');return true;}
}
function renderFoot(){
  const dates=sortedDates();
  const mode=ONLINE?'資料儲存於 Google 試算表（後台），所有開啟者看到同一份累積資料。':'目前為本機預覽模式：資料只存在你的瀏覽器，不會與他人共享。請依 README 設定 GAS_URL 開啟共享。';
  $('#footnote').innerHTML=mode+(dates.length?('　目前涵蓋 '+dates.length+' 天（'+dates[0]+' ~ '+dates[dates.length-1]+'）'):'')+'<br>每日匯入新的一天統計表即可持續累積；同一天重複匯入會以最新內容覆蓋，異常明細自動去重。';
}
function renderAll(){renderKpis();renderRank();renderTrend();fillDetailFilters();renderDetail();renderSpeed();renderFoot();}

/* ---------- conn / busy ---------- */
function setConn(state){const p=$('#connPill'),t=$('#connTxt');p.className='pill '+(state==='cloud'?'cloud':state==='err'?'err':'local');t.textContent=state==='cloud'?'雲端已連線':state==='err'?'連線失敗':'本機預覽模式';}
function setBusy(b,label){busy=b;const btn=$('#importBtn');btn.disabled=b;$('#refreshBtn').disabled=b;btn.innerHTML=b?('<span class="spin"></span>'+(label||'處理中…')):'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>匯入 Excel';}

/* ---------- events ---------- */
$('#importBtn').onclick=()=>{if(!busy)$('#fileInput').click();};
$('#fileInput').onchange=e=>{if(e.target.files.length)handleFiles([...e.target.files]);e.target.value='';};
$('#refreshBtn').onclick=async()=>{if(busy)return;if(!ONLINE){toast('本機模式','無雲端後台可更新','warn');return;}setBusy(true,'更新中…');try{await loadAll();lastSig=signature();renderAll();toast('已更新','');}catch(e){setConn('err');toast('更新失敗',String(e.message||e),'err');}setBusy(false);};
$('#clearBtn').onclick=async()=>{if(busy)return;if(!confirm('確定清除所有已匯入的統計與異常資料？此動作無法復原。'))return;setBusy(true,'清除中…');try{if(ONLINE)await gasPost({type:'clear'});DAILY={dept:DEPT_NAME,days:{}};ANOM={records:[]};if(!ONLINE)saveLocal();else await loadAll();}catch(e){toast('清除失敗',String(e.message||e),'err');}setBusy(false);lastSig=signature();renderAll();toast('已清除全部資料','');};
$$('.tab').forEach(t=>t.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');$$('.panel').forEach(p=>p.classList.remove('on'));$('#p-'+t.dataset.tab).classList.add('on');if(t.dataset.tab==='trend')renderTrend();});
['#rankDate','#rankSort'].forEach(s=>$(s).onchange=renderRank);
['#trendScope','#trendMetric'].forEach(s=>$(s).onchange=renderTrend);
['#dfBranch','#dfBehavior','#dfDegree'].forEach(s=>$(s).onchange=renderDetail);
$('#dfSearch').oninput=renderDetail;
['#spBranch','#spSev'].forEach(s=>$(s).onchange=renderSpeed);
$('#spDisc').onchange=renderSpeed;
$('#dfExport').onclick=()=>{const rows=filteredAnom();if(!rows.length){toast('無資料可匯出','','warn');return;}const head=['日期','站所','車號','駕駛','行為','等級','最高時速','法定限速','超過km','異常程度','處置','懲處'];const lines=[head.join(',')].concat(rows.map(r=>[r.date,r.branch,r.plate,r.driver,r.behavior,r.level,r.maxSpeed,r.legal,r.over,r.degText,r.disposal,r.disc].map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')));const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='異常明細查詢.csv';a.click();toast('已匯出 CSV',rows.length+' 筆');};

let dragDepth=0;
window.addEventListener('dragenter',e=>{e.preventDefault();dragDepth++;$('#drop').classList.add('show');});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('dragleave',e=>{dragDepth--;if(dragDepth<=0)$('#drop').classList.remove('show');});
window.addEventListener('drop',e=>{e.preventDefault();dragDepth=0;$('#drop').classList.remove('show');const fs=[...e.dataTransfer.files].filter(f=>/\.xlsx?$/i.test(f.name));if(fs.length)handleFiles(fs);});

/* ---------- 字級切換（標準/放大/老花，記住設定） ---------- */
function applyFs(v){
  document.documentElement.style.setProperty('--fs',v);
  $$('#fsbar button').forEach(b=>b.classList.toggle('on',b.dataset.fs===String(v)));
  try{localStorage.setItem('fleet_fs',String(v));}catch(e){}
  if(trendChart){try{trendChart.resize();}catch(e){}}
}
$$('#fsbar button').forEach(b=>b.onclick=()=>applyFs(b.dataset.fs));
(function(){let v='1';try{v=localStorage.getItem('fleet_fs')||'1';}catch(e){}applyFs(v);})();

/* ---------- init + auto refresh ---------- */
(async()=>{
  if(ONLINE){
    try{await loadAll();setConn('cloud');}catch(e){setConn('err');toast('無法連線後台',String(e.message||e)+'（請檢查 GAS_URL 與部署權限）','err');}
  }else{
    await loadAll();setConn('local');
  }
  lastSig=signature();renderAll();
  if(ONLINE&&AUTO_REFRESH_SEC>0){setInterval(async()=>{if(busy||document.hidden)return;try{await loadAll();const s=signature();if(s!==lastSig){lastSig=s;renderAll();toast('已同步最新資料','');setConn('cloud');}}catch(e){setConn('err');}},AUTO_REFRESH_SEC*1000);}
})();
</script>
</body>
</html>
