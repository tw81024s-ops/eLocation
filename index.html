    --t-sub5:#c4b2bd;--t-light:#f5c518;--t-mod:#ef7c1c;--t-severe:#e53935;

  body{font-family:"Noto Sans TC",sans-serif;color:var(--ink);min-height:100vh;

    padding:22px clamp(14px,4vw,40px) 60px;}
  .num{font-family:"Sora",sans-serif;font-variant-numeric:tabular-nums}
  header.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .logo{width:54px;height:54px;border-radius:16px;flex:none;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#fff;font-size:26px;box-shadow:0 8px 20px rgba(230,23,127,.35)}
  .title h1{font-size:clamp(19px,2.3vw,27px);font-weight:900;letter-spacing:.5px}
  .title p{font-size:12px;letter-spacing:3px;color:var(--brand);font-weight:700;margin-top:2px}
  .top-spacer{flex:1}
  .pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;color:var(--brand);box-shadow:var(--shadow);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(47,185,104,.18)}

  /* tab bar */
  .tabbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tabbar button{border:0;cursor:pointer;font-family:inherit;font-weight:800;font-size:15px;padding:11px 22px;border-radius:13px;background:#fff;color:var(--muted);border:1px solid var(--line);box-shadow:var(--shadow);transition:.15s}
  .tabbar button.on{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;border-color:transparent}
  .tabbar button:hover{transform:translateY(-1px)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:22px}
  .stat{background:var(--card);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid #fff}
  .stat .k{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px}
  .stat .k::before{content:"";width:4px;height:13px;border-radius:3px;background:var(--brand)}
  .stat .v{font-size:29px;font-weight:800;margin-top:6px}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600;margin-left:4px}
  .stat .s{font-size:11px;color:var(--muted);margin-top:4px}

  .crumbs{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:14px;flex-wrap:wrap}
  .crumbs button{border:0;background:#fff;border:1px solid var(--line);cursor:pointer;padding:8px 14px;border-radius:10px;font-family:inherit;font-weight:700;color:var(--brand);box-shadow:var(--shadow);transition:.15s}
  .crumbs button:hover{transform:translateY(-1px)}
  .crumbs .here{color:var(--muted);font-weight:700}
  .legend{margin-left:auto;display:flex;gap:14px;font-size:12px;color:var(--muted);font-weight:700;flex-wrap:wrap}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .scard{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow);border:1px solid #fff;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .scard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(230,23,127,.18)}
  .scard .rank{position:absolute;top:0;right:0;font-family:"Sora";font-weight:800;font-size:44px;color:#ffe1ef;line-height:1;padding:8px 16px}
  .scard-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .gradeball{width:62px;height:62px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-family:"Sora";font-weight:800;font-size:30px;line-height:1;box-shadow:0 6px 16px rgba(0,0,0,.12)}

  .scard-head .meta .sc small{font-size:12px;color:var(--muted);font-weight:600}
  .minirow{display:flex;justify-content:space-between;gap:6px;margin-top:4px}
  .mg{flex:1;text-align:center}
  .mg .lbl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
  .scard-foot{display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:12px;color:var(--muted);font-weight:600}
  .scard-foot b{font-family:"Sora";color:var(--ink);font-size:15px;display:block;font-weight:700}
  .scard-foot .idle b{color:var(--t-mod)}
  .opencue{text-align:center;margin-top:12px;font-size:12.5px;font-weight:700;color:var(--brand);opacity:.85}

  .panel{background:var(--card);border-radius:22px;padding:22px;box-shadow:var(--shadow);border:1px solid #fff;margin-bottom:18px}
  .detail-top{display:grid;grid-template-columns:minmax(240px,300px) 1fr;gap:24px;align-items:center}
  @media(max-width:820px){.detail-top{grid-template-columns:1fr}}
  .rate-box .ttl{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:10px}

  .gradewrap .tot b{display:block;font-family:"Sora";font-size:46px;color:var(--ink);font-weight:800;line-height:1}

  .gauge-card{background:#fafafa;border:1px solid #eee;border-radius:16px;padding:10px 6px 6px}

  .band .bt{font-size:13px;font-weight:800}.band .bd{font-size:11px;color:var(--muted);margin-top:2px}
  .band .bn{font-family:"Sora";font-size:24px;font-weight:800;float:right;color:var(--c)}

  table.tbl td{padding:11px 10px;border-top:1px solid #f6e6ef;vertical-align:middle}
  table.tbl tr.click{cursor:pointer}
  table.tbl tr.click:hover td{background:#fff5fa}
  .stack{display:flex;height:9px;border-radius:6px;overflow:hidden;background:#f0e6ec;min-width:120px}
  .stack i{display:block;height:100%}
  .tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:800;color:#fff}
  .right{text-align:right}.cen{text-align:center}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>

const METRICS=[{key:'speed',name:'超速',icon:'🚀'},{key:'turn',name:'急轉彎',icon:'↪'},{key:'decel',name:'急減速',icon:'↘'},{key:'accel',name:'急加速',icon:'↗'}];

function grade(s){if(s>=90)return{g:'A',c:'var(--good)'};if(s>=80)return{g:'B',c:'#6cc24a'};if(s>=70)return{g:'C',c:'var(--warn)'};if(s>=60)return{g:'D',c:'#ef7c1c'};return{g:'E',c:'var(--bad)'}}

/* ===== 怠速分級（依使用者定義） ===== */
const TIERS=[
  {key:'sub5',  name:'未達標 3~5分', short:'3~5分',  c:'var(--t-sub5)',  lo:3, hi:5},
  {key:'light', name:'輕度 5~10分',  short:'輕度',   c:'var(--t-light)', lo:5, hi:10},
  {key:'mod',   name:'中度 10~15分', short:'中度',   c:'var(--t-mod)',   lo:10,hi:15},
  {key:'severe',name:'重度 15分以上',short:'重度',   c:'var(--t-severe)',lo:15,hi:1e9},
];
const tier=m=> m<5?'sub5': m<10?'light': m<15?'mod':'severe';
const tierC={sub5:'var(--t-sub5)',light:'var(--t-light)',mod:'var(--t-mod)',severe:'var(--t-severe)'};
const tierShort={sub5:'未達標',light:'輕度',mod:'中度',severe:'重度'};
function durMin(s){s=String(s||'');const h=/(\d+)時/.exec(s),m=/(\d+)分/.exec(s),sec=/(\d+)秒/.exec(s);return Math.round(((h?+h[1]*60:0)+(m?+m[1]:0)+(sec?+sec[1]/60:0))*10)/10;}

/* ===== 確定性亂數（用於示範安全分數） ===== */
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

/* ===== 儀表 SVG ===== */
function gauge(score,rate,big){
  const r=70,cx=100,cy=100,segs=10;
  const cols=['#7d2db5','#b3279a','#e0218a','#e94e3c','#f5811f','#f7b500','#cfd11f','#9bcf3a','#5cc24a','#2fb14d'];
  let arcs='';for(let i=0;i<segs;i++){const a0=180-(180/segs)*i,a1=180-(180/segs)*(i+1),rad=d=>d*Math.PI/180;
    const x0=cx+r*Math.cos(rad(a0)),y0=cy-r*Math.sin(rad(a0)),x1=cx+r*Math.cos(rad(a1)),y1=cy-r*Math.sin(rad(a1));
    arcs+=`<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}" stroke="${cols[i]}" stroke-width="15" fill="none"/>`;}
  const ang=180-(score/100)*180,rad=ang*Math.PI/180,nx=cx+(r-6)*Math.cos(rad),ny=cy-(r-6)*Math.sin(rad);
  const col=score>=80?'#2fb14d':score>=70?'#f7b500':'#e0218a',fs=big?30:20;
  return `<svg viewBox="0 0 200 ${big?128:120}" width="100%">${arcs}
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="#3a1f4d" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="#3a1f4d"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="Sora" font-weight="800" font-size="${fs}" fill="${col}">${score}<tspan font-size="${big?12:9}" fill="#888">分</tspan></text>
    ${rate!=null?`<text x="${cx}" y="${big?122:114}" text-anchor="middle" font-family="Sora" font-size="${big?11:9}" fill="#2f7bd6">(${rate}次/100KM)</text>`:''}</svg>`;
}

/* ===== 由怠速資料建模 ===== */
let IDLE=[], STATIONS=[], COMPANY=null, DATASET_DATE='2026-05-24';
function emptyIdle(){return{sub5:0,light:0,mod:0,severe:0,total:0,sumMin:0,maxMin:0}}
function build(records){
  IDLE=records;
  const stMap={};
  records.forEach(r=>{
    const [br,plate,drv,mn,time,loc]=r,t=tier(mn);
    const st=stMap[br]||(stMap[br]={id:br,dmap:{},idle:emptyIdle()});
    st.idle[t]++;st.idle.total++;st.idle.sumMin+=mn;st.idle.maxMin=Math.max(st.idle.maxMin,mn);
    const dk=plate+'|'+(drv||'（未綁定）');
    const d=st.dmap[dk]||(st.dmap[dk]={name:drv||'（未綁定）',plate,recs:[],idle:emptyIdle()});
    d.idle[t]++;d.idle.total++;d.idle.sumMin+=mn;d.idle.maxMin=Math.max(d.idle.maxMin,mn);
    d.recs.push({mn,time,loc,t});
  });
  STATIONS=Object.values(stMap).map(st=>{
    const drivers=Object.values(st.dmap).map(d=>{
      const r=rng(hash(st.id+d.plate+d.name)),sc=()=>Math.max(48,Math.min(100,Math.round(100-r()*r()*52)));
      d.speed=sc();d.turn=sc();d.decel=sc();d.accel=sc();d.score=total(d);
      d.km=18+Math.floor(r()*82);
      d.rate={};METRICS.forEach(m=>d.rate[m.key]=((100-d[m.key])*0.4).toFixed(1));
      return d;
    }).sort((a,b)=>b.idle.total-a.idle.total);
    st.drivers=drivers;st.n=drivers.length;
    const avg=k=>Math.round(drivers.reduce((a,d)=>a+d[k],0)/drivers.length);
    st.speed=avg('speed');st.turn=avg('turn');st.decel=avg('decel');st.accel=avg('accel');st.score=total(st);
    st.km=drivers.reduce((a,d)=>a+d.km,0);
    st.rate={};METRICS.forEach(m=>st.rate[m.key]=((100-st[m.key])*0.4).toFixed(1));
    delete st.dmap;return st;
  }).sort((a,b)=>b.score-a.score);
  // company
  const all=STATIONS.flatMap(s=>s.drivers);
  const cAvg=k=>Math.round(all.reduce((a,d)=>a+d[k],0)/all.length);
  COMPANY={id:'富昇物流（全公司）',speed:cAvg('speed'),turn:cAvg('turn'),decel:cAvg('decel'),accel:cAvg('accel'),
    n:all.length,stN:STATIONS.length,km:STATIONS.reduce((a,s)=>a+s.km,0),
    idle:{total:IDLE.length,sub5:0,light:0,mod:0,severe:0}};
  IDLE.forEach(r=>COMPANY.idle[tier(r[3])]++);
  COMPANY.score=total(COMPANY);
  COMPANY.rate={};METRICS.forEach(m=>COMPANY.rate[m.key]=((100-COMPANY[m.key])*0.4).toFixed(1));
}

/* ===== 共用元件 ===== */
function weightTable(s){const p={speed:(s.speed*W.speed).toFixed(1),turn:(s.turn*W.turn).toFixed(1),decel:(s.decel*W.decel).toFixed(1),accel:(s.accel*W.accel).toFixed(1)};
  return `<table class="weights"><tr class="pts"><td>${p.speed}分</td><td>${p.turn}分</td><td>${p.decel}分</td><td>${p.accel}分</td></tr>
  <tr class="nm"><td>超速</td><td>急轉彎</td><td>急減速</td><td>急加速</td></tr><tr class="pct"><td>40%</td><td>30%</td><td>20%</td><td>10%</td></tr></table>`;}
function gaugeCards(s,big){let h='<div class="gauges">';METRICS.forEach(m=>h+=`<div class="gauge-card"><div class="gt">${m.icon} ${m.name}</div>${gauge(s[m.key],s.rate?s.rate[m.key]:null,big)}</div>`);return h+'</div>';}
function stackBar(idle){const t=idle.total||1;let h='<div class="stack">';['sub5','light','mod','severe'].forEach(k=>{const w=(idle[k]/t*100).toFixed(1);if(idle[k])h+=`<i style="width:${w}%;background:${tierC[k]}" title="${tierShort[k]} ${idle[k]}"></i>`});return h+'</div>';}

/* ===== 狀態 / 路由 ===== */
const view=document.getElementById('view'),crumbs=document.getElementById('crumbs'),statsEl=document.getElementById('stats');
let TAB='safety';

function renderStats(){
  if(TAB==='safety'){
    const g=grade(COMPANY.score);
    statsEl.innerHTML=`
    <div class="stat"><div class="k">資料日期</div><div class="v num" style="font-size:20px">${DATASET_DATE}</div><div class="s">中南配送部</div></div>
    <div class="stat"><div class="k">站所數</div><div class="v num">${COMPANY.stN}<small>站</small></div></div>
    <div class="stat"><div class="k">駕駛數</div><div class="v num">${COMPANY.n}<small>位</small></div></div>
    <div class="stat"><div class="k">平均總分</div><div class="v num" style="color:var(--brand)">${COMPANY.score}</div><div class="s">評等 ${g.g}</div></div>
    <div class="stat"><div class="k">怠速總件數</div><div class="v num" style="color:var(--t-mod)">${COMPANY.idle.total}</div><div class="s">重度 ${COMPANY.idle.severe} 件</div></div>`;
  }else{
    const i=COMPANY.idle;
    statsEl.innerHTML=`
    <div class="stat"><div class="k">資料日期</div><div class="v num" style="font-size:20px">${DATASET_DATE}</div><div class="s">怠速3分鐘以上</div></div>
    <div class="stat"><div class="k">怠速總件數</div><div class="v num">${i.total}<small>件</small></div></div>
    <div class="stat"><div class="k">輕度 5~10分</div><div class="v num" style="color:var(--t-light)">${i.light}</div></div>
    <div class="stat"><div class="k">中度 10~15分</div><div class="v num" style="color:var(--t-mod)">${i.mod}</div></div>
    <div class="stat"><div class="k">重度 15分以上</div><div class="v num" style="color:var(--t-severe)">${i.severe}</div></div>`;
  }
}

/* ===== 安全評分看板 ===== */
function safetyCrumbs(here){crumbs.innerHTML=`<button id="b1">公司總覽</button>${here?`<span style="color:var(--muted)">›</span><span class="here">${here}</span>`:''}
  <div class="legend"><span><i style="background:var(--good)"></i>A/B 良好</span><span><i style="background:var(--warn)"></i>C/D 注意</span><span><i style="background:var(--bad)"></i>E 危險</span></div>`;
  document.getElementById('b1').onclick=safetyHome;}
function safetyHome(){
  safetyCrumbs();
  const g=grade(COMPANY.score);
  let h=`<div class="panel fade"><div class="detail-top">
    <div class="rate-box"><div class="ttl">公司整體安全評等 · ${COMPANY.stN} 站 / ${COMPANY.n} 位駕駛</div>
      <div class="gradewrap"><div class="big" style="background:${g.c}">${g.g}</div><div class="tot">平均總分<b class="num">${COMPANY.score}<small>分</small></b></div></div>
      ${weightTable(COMPANY)}</div>
    <div><div class="rate-box ttl" style="margin-bottom:10px">公司整體安全指數</div>${gaugeCards(COMPANY,true)}</div>
  </div></div>`;
  h+='<div class="sec-ttl">站所排行榜（點擊站所查看個人評比）</div><div class="grid fade">';
  STATIONS.forEach((s,i)=>{const sg=grade(s.score);let mini='<div class="minirow">';
    METRICS.forEach(m=>mini+=`<div class="mg">${gauge(s[m.key],null,false)}<div class="lbl">${m.name}</div></div>`);mini+='</div>';
    h+=`<div class="scard" data-st="${s.id}"><div class="rank num">${i+1}</div>
      <div class="scard-head"><div class="gradeball" style="background:${sg.c}">${sg.g}</div>
        <div class="meta"><div class="st">${s.id}</div><div class="sc num">${s.score}<small>分</small></div></div></div>
      ${mini}
      <div class="scard-foot"><div>車輛<b class="num">${s.n}</b></div><div>里程<b class="num">${s.km} KM</b></div>
        <div class="idle">怠速<b class="num">${s.idle.total} 件</b></div></div>
      <div class="opencue">點擊查看 ${s.n} 位駕駛個人評比 →</div></div>`;});
  h+='</div>';view.innerHTML=h;
  document.querySelectorAll('.scard').forEach(el=>el.onclick=()=>safetyStation(el.dataset.st));
}
function safetyStation(id){
  const s=STATIONS.find(x=>x.id===id),g=grade(s.score);
  safetyCrumbs(s.id+' · 個人評比');
  let h=`<div class="panel fade"><div class="detail-top">
    <div class="rate-box"><div class="ttl">安全評等 — ${s.id}（怠速 ${s.idle.total} 件，重度 ${s.idle.severe}）</div>
      <div class="gradewrap"><div class="big" style="background:${g.c}">${g.g}</div><div class="tot">總分<b class="num">${s.score}<small>分</small></b></div></div>
      ${weightTable(s)}</div>
    <div><div class="rate-box ttl" style="margin-bottom:10px">安全指數</div>${gaugeCards(s,true)}</div></div></div>`;
  h+=`<div class="sec-ttl">個人評比（${s.n} 位駕駛）</div><div class="drivers fade">`;
  [...s.drivers].sort((a,b)=>b.score-a.score).forEach(d=>{const dg=grade(d.score);let mini='<div class="dmini">';
    METRICS.forEach(m=>mini+=`<div class="mg">${gauge(d[m.key],null,false)}<div class="lbl">${m.name}</div></div>`);mini+='</div>';
    h+=`<div class="dcard"><div class="dhead"><div class="gb" style="background:${dg.c}">${dg.g}</div>
      <div><div class="nm">${d.name}</div><div class="plate">${d.plate}</div></div>
      <div class="dsc"><b class="num">${d.score}</b><small>總分</small></div></div>
      <div style="margin-bottom:10px">${weightTable(d)}</div>${mini}
      <div class="dstats"><div>里程<b class="num">${d.km} KM</b></div><div>怠速<b class="num" style="color:var(--t-mod)">${d.idle.total} 件</b></div>
        <div>重度<b class="num" style="color:var(--t-severe)">${d.idle.severe}</b></div><div>最長<b class="num">${d.idle.maxMin} 分</b></div></div></div>`;});
  h+='</div>';view.innerHTML=h;
}

/* ===== 怠速查看 ===== */
function idleCrumbs(parts){let h='<button id="ib1">怠速總覽</button>';let acc=[];
  parts.forEach(p=>{h+=`<span style="color:var(--muted)">›</span><span class="here">${p}</span>`});
  crumbs.innerHTML=h;document.getElementById('ib1').onclick=idleHome;}
function bandsRow(idle){return `<div class="bands">${TIERS.map(t=>`<div class="band" style="--c:${t.c}"><span class="bn">${idle[t.key]}</span><div class="bt">${t.short}</div><div class="bd">${t.name.replace(t.short,'').trim()||t.name}</div></div>`).join('')}</div>`;}
function idleHome(){
  idleCrumbs([]);
  let h=`<div class="toolbar"><button class="btn" id="impBtn">⤓ 匯入怠速 Excel</button>
    <button class="btn ghost" id="resetBtn">重設為範例資料</button>
    <span class="note">分級：5~10分＝輕度、10~15分＝中度、15分以上＝重度（3~5分列為未達標）。可同時匯入「依車輛」「依駕駛」兩份。</span></div>`;
  h+=bandsRow(COMPANY.idle);
  h+='<div class="sec-ttl">站所怠速排行（點擊站所查看駕駛明細）</div>';
  const rows=[...STATIONS].sort((a,b)=>b.idle.total-a.idle.total||b.idle.severe-a.idle.severe);
  h+=`<table class="tbl fade"><thead><tr><th>#</th><th>站所</th><th class="cen">總件數</th><th class="cen">輕度</th><th class="cen">中度</th><th class="cen">重度</th><th>嚴重度分布</th></tr></thead><tbody>`;
  rows.forEach((s,i)=>{h+=`<tr class="click" data-st="${s.id}"><td class="num">${i+1}</td><td><b>${s.id}</b></td>
    <td class="cen num"><b>${s.idle.total}</b></td>
    <td class="cen num" style="color:var(--t-light)">${s.idle.light}</td>
    <td class="cen num" style="color:var(--t-mod)">${s.idle.mod}</td>
    <td class="cen num" style="color:var(--t-severe)">${s.idle.severe||''}</td>
    <td>${stackBar(s.idle)}</td></tr>`;});
  h+='</tbody></table>';view.innerHTML=h;
  document.querySelectorAll('tr.click').forEach(el=>el.onclick=()=>idleStation(el.dataset.st));
  document.getElementById('impBtn').onclick=()=>document.getElementById('fileInput').click();
  document.getElementById('resetBtn').onclick=()=>{build(IDLE_SEED.map(r=>r.slice()));renderStats();idleHome();};
}
function idleStation(id){
  const s=STATIONS.find(x=>x.id===id);idleCrumbs([s.id]);
  let h=`<div class="toolbar"><button class="btn ghost" onclick="idleHome()">← 返回站所</button>
    <span class="note">${s.id}　怠速 ${s.idle.total} 件，總時長約 ${Math.round(s.idle.sumMin)} 分鐘</span></div>`;
  h+=bandsRow(s.idle);
  h+='<div class="sec-ttl">駕駛怠速明細（點擊駕駛查看每筆記錄）</div>';
  const rows=[...s.drivers].sort((a,b)=>b.idle.total-a.idle.total);
  h+=`<table class="tbl fade"><thead><tr><th>#</th><th>駕駛</th><th>車號</th><th class="cen">總件數</th><th class="cen">輕度</th><th class="cen">中度</th><th class="cen">重度</th><th class="cen">最長(分)</th></tr></thead><tbody>`;
  rows.forEach((d,i)=>{if(!d.idle.total)return;h+=`<tr class="click" data-dk="${d.plate}">
    <td class="num">${i+1}</td><td><b>${d.name}</b></td><td class="num">${d.plate}</td>
    <td class="cen num"><b>${d.idle.total}</b></td>
    <td class="cen num" style="color:var(--t-light)">${d.idle.light||''}</td>
    <td class="cen num" style="color:var(--t-mod)">${d.idle.mod||''}</td>
    <td class="cen num" style="color:var(--t-severe)">${d.idle.severe||''}</td>
    <td class="cen num">${d.idle.maxMin}</td></tr>`;});
  h+='</tbody></table>';view.innerHTML=h;
  document.querySelectorAll('tr.click').forEach(el=>el.onclick=()=>idleDriver(s.id,el.dataset.dk));
}
function idleDriver(sid,plate){
  const s=STATIONS.find(x=>x.id===sid),d=s.drivers.find(x=>x.plate===plate);
  idleCrumbs([s.id,d.name]);
  let h=`<div class="toolbar"><button class="btn ghost" onclick="idleStation('${sid}')">← 返回 ${s.id}</button>
    <span class="note">${d.name}（${d.plate}）　怠速 ${d.idle.total} 件</span></div>`;
  h+=bandsRow(d.idle);
  h+='<div class="sec-ttl">逐筆怠速記錄</div>';
  h+=`<table class="tbl fade"><thead><tr><th>#</th><th>結束時間</th><th class="cen">持續(分)</th><th class="cen">分級</th><th>怠速位置</th></tr></thead><tbody>`;
  [...d.recs].sort((a,b)=>b.mn-a.mn).forEach((r,i)=>{h+=`<tr><td class="num">${i+1}</td><td class="num">${r.time}</td>
    <td class="cen num"><b>${r.mn}</b></td><td class="cen"><span class="tag" style="background:${tierC[r.t]}">${tierShort[r.t]}</span></td>
    <td style="color:var(--muted)">${r.loc}</td></tr>`;});
  h+='</tbody></table>';view.innerHTML=h;
}

/* ===== 匯入 ===== */
document.getElementById('fileInput').onchange=async e=>{
  const files=[...e.target.files];if(!files.length)return;
  let merged=[],date=null;
  for(const f of files){
    const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    const hi=aoa.findIndex(r=>r&&r.indexOf('分公司')>=0);if(hi<0)continue;
    const hdr=aoa[hi].map(x=>String(x).trim()),ci=n=>hdr.indexOf(n);
    const iB=ci('分公司'),iP=ci('車號'),iD=ci('駕駛'),iDur=ci('持續時間'),iE=ci('怠速時間(迄)'),iL=ci('怠速位置');
    // 嘗試抓查詢日期
    const titleRow=aoa.slice(0,hi).map(r=>r.join('')).join(' ');const md=/(\d{4}\/\d{1,2}\/\d{1,2})/.exec(titleRow);if(md)date=md[1].replace(/\//g,'-');
    for(let i=hi+1;i<aoa.length;i++){const r=aoa[i];if(!r||!r[iB])continue;
      merged.push([String(r[iB]).trim(),String(r[iP]||'').trim(),String(r[iD]||'').trim(),durMin(r[iDur]),String(r[iE]||'').trim(),String(r[iL]||'')]);}
  }
  if(!merged.length){alert('未在檔案中找到怠速明細（需含「分公司／持續時間」欄位）。');return;}
  // 去重（同車號+結束時間+持續），避免兩份重複
  const seen=new Set();merged=merged.filter(r=>{const k=r[1]+r[4]+r[3];if(seen.has(k))return false;seen.add(k);return true;});
  if(date)DATASET_DATE=date;
  build(merged);renderStats();
  TAB='idle';switchTab();idleHome();
  e.target.value='';
};

/* ===== 分頁切換 ===== */
function switchTab(){
  document.getElementById('tabSafety').classList.toggle('on',TAB==='safety');
  document.getElementById('tabIdle').classList.toggle('on',TAB==='idle');
  renderStats();
  if(TAB==='safety')safetyHome();else idleHome();
}
document.getElementById('tabSafety').onclick=()=>{TAB='safety';switchTab();};
document.getElementById('tabIdle').onclick=()=>{TAB='idle';switchTab();};

/* ===== 啟動 ===== */
build(IDLE_SEED.map(r=>r.slice()));
switchTab();
</script>
